<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crete Info Point Full</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; background-color: #f0f2f5; color: #1c1e21; 
        }
        .language-bar { 
            background: #ffffff; padding: 10px; display: flex; justify-content: center; 
            gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .language-bar img { width: 35px; height: auto; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .language-bar img:active { transform: scale(0.9); }
        .hero-img { width: 100%; height: auto; display: block; max-height: 300px; object-fit: cover; }
        .bonus-tip { 
            background-color: #fff9db; border: 1px solid #ffe066; margin: 15px; padding: 15px; 
            font-size: 0.95rem; border-radius: 12px; color: #856404; display: flex; gap: 10px; 
        }
        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .category-btn { 
            aspect-ratio: 1/1; padding: 15px; border: none; border-radius: 16px; background: #ffffff; 
            color: #007bff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: 600;
        }
        .category-btn span { font-size: 2.5rem; }
        .content-panel { display: none; min-height: 100vh; background: white; padding: 20px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .back-btn { background: #f0f2f5; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        @media (min-width: 768px) {
            .menu-container { grid-template-columns: repeat(4, 1fr); max-width: 900px; margin: 0 auto; }
            .hero-img, .bonus-tip, .content-panel { max-width: 800px; margin: 20px auto; border-radius: 20px; }
        }
    </style>
</head>
<body>

    <div class="language-bar">
        <img src="https://flagcdn.com/w80/gr.png" onclick="translateTo('el')">
        <img src="https://flagcdn.com/w80/gb.png" onclick="translateTo('en')">
        <img src="https://flagcdn.com/w80/de.png" onclick="translateTo('de')">
        <img src="https://flagcdn.com/w80/fr.png" onclick="translateTo('fr')">
        <img src="https://flagcdn.com/w80/it.png" onclick="translateTo('it')">
    </div>

    <div id="main-view">
        <img src="crete.png" alt="Crete" class="hero-img">
        <div class="bonus-tip">
            <span>💡</span><div id="bonus-inner"></div>
        </div>
        <div class="menu-container">
            <button class="category-btn" onclick="showCategory('history')"><span>🏛️</span><label data-key="btn-history"></label></button>
            <button class="category-btn" onclick="showCategory('nature')"><span>🏔️</span><label data-key="btn-nature"></label></button>
            <button class="category-btn" onclick="showCategory('diet')"><span>🥘</span><label data-key="btn-diet"></label></button>
            <button class="category-btn" onclick="showCategory('regions')"><span>📍</span><label data-key="btn-regions"></label></button>
        </div>
    </div>

    <div id="history" class="content-panel">
        <button class="back-btn" onclick="goBack()" data-key="back"></button>
        <h2 data-key="btn-history"></h2>
        <div data-key="txt-history"></div>
    </div>

    <div id="nature" class="content-panel">
        <button class="back-btn" onclick="goBack()" data-key="back"></button>
        <h2 data-key="btn-nature"></h2>
        <div data-key="txt-nature"></div>
    </div>

    <div id="diet" class="content-panel">
        <button class="back-btn" onclick="goBack()" data-key="back"></button>
        <h2 data-key="btn-diet"></h2>
        <div data-key="txt-diet"></div>
    </div>

    <div id="regions" class="content-panel">
        <button class="back-btn" onclick="goBack()" data-key="back"></button>
        <h2 data-key="btn-regions"></h2>
        <div class="table-wrapper" id="table-container"></div>
    </div>

    <script>
        const translations = {
            el: {
                back: "← Πίσω",
                bonus: "Στην Κρήτη η φιλοξενία είναι ιερή. Μην αρνηθείς κέρασμα!",
                "btn-history": "Ιστορία", "btn-nature": "Φύση", "btn-diet": "Διατροφή", "btn-regions": "Νομοί",
                "txt-history": "<ul><li>Μινωικός Πολιτισμός</li><li>Κρητική Λύρα</li></ul>",
                "txt-nature": "<ul><li>Ψηλορείτης</li><li>Φαράγγι Σαμαριάς</li></ul>",
                "txt-diet": "<ul><li>Ελαιόλαδο</li><li>Ντάκος</li><li>Τσικουδιά</li></ul>",
                table: "<table><tr><th>Νομός</th><th>Info</th></tr><tr><td>Χανιά</td><td>Λιμάνι</td></tr><tr><td>Ηράκλειο</td><td>Κνωσός</td></tr></table>"
            },
            en: {
                back: "← Back",
                bonus: "In Crete, hospitality is sacred. Never refuse a treat!",
                "btn-history": "History", "btn-nature": "Nature", "btn-diet": "Diet", "btn-regions": "Regions",
                "txt-history": "<ul><li>Minoan Civilization</li><li>Cretan Lyra</li></ul>",
                "txt-nature": "<ul><li>Psiloritis Mt.</li><li>Samaria Gorge</li></ul>",
                "txt-diet": "<ul><li>Olive Oil</li><li>Dakos</li><li>Tsikoudia</li></ul>",
                table: "<table><tr><th>Region</th><th>Info</th></tr><tr><td>Chania</td><td>Harbor</td></tr><tr><td>Heraklion</td><td>Knossos</td></tr></table>"
            },
            de: {
                back: "← Zurück",
                bonus: "Gastfreundschaft ist auf Kreta heilig. Lehne niemals eine Einladung ab!",
                "btn-history": "Geschichte", "btn-nature": "Natur", "btn-diet": "Ernährung", "btn-regions": "Regionen",
                "txt-history": "<ul><li>Minoische Kultur</li><li>Kretische Lyra</li></ul>",
                "txt-nature": "<ul><li>Psiloritis Berg</li><li>Samaria-Schlucht</li></ul>",
                "txt-diet": "<ul><li>Olivenöl</li><li>Dakos</li><li>Tsikoudia</li></ul>",
                table: "<table><tr><th>Region</th><th>Info</th></tr><tr><td>Chania</td><td>Hafen</td></tr><tr><td>Heraklion</td><td>Knossos</td></tr></table>"
            },
            fr: {
                back: "← Retour",
                bonus: "En Crète, l'hospitalité est sacrée. Ne refusez jamais une offre!",
                "btn-history": "Histoire", "btn-nature": "Nature", "btn-diet": "Régime", "btn-regions": "Régions",
                "txt-history": "<ul><li>Civilisation Minoenne</li><li>Lyra Crétoise</li></ul>",
                "txt-nature": "<ul><li>Mont Psiloritis</li><li>Gorges de Samaria</li></ul>",
                "txt-diet": "<ul><li>Huile d'olive</li><li>Dakos</li><li>Tsikoudia</li></ul>",
                table: "<table><tr><th>Région</th><th>Info</th></tr><tr><td>Chania</td><td>Port</td></tr><tr><td>Heraklion</td><td>Knossos</td></tr></table>"
            },
            it: {
                back: "← Indietro",
                bonus: "A Creta l'ospitalità è sacra. Non rifiutare mai un invito!",
                "btn-history": "Storia", "btn-nature": "Natura", "btn-diet": "Dieta", "btn-regions": "Regioni",
                "txt-history": "<ul><li>Civiltà Minoica</li><li>Lira Cretese</li></ul>",
                "txt-nature": "<ul><li>Monte Psiloritis</li><li>Gole di Samaria</li></ul>",
                "txt-diet": "<ul><li>Olio d'oliva</li><li>Dakos</li><li>Tsikoudia</li></ul>",
                table: "<table><tr><th>Regione</th><th>Info</th></tr><tr><td>Chania</td><td>Porto</td></tr><tr><td>Heraklion</td><td>Cnosso</td></tr></table>"
            }
        };

        function translateTo(lang) {
            const dict = translations[lang];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (dict[key]) el.innerHTML = dict[key];
            });
            document.getElementById('bonus-inner').innerText = dict.bonus;
            document.getElementById('table-container').innerHTML = dict.table;
        }

        function showCategory(id) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            window.scrollTo(0,0);
        }

        function goBack() {
            document.querySelectorAll('.content-panel').forEach(p => p.style.display = 'none');
            document.getElementById('main-view').style.display = 'block';
        }

        translateTo('el');
    </script>
</body>
</html>
